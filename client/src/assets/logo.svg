<svg viewBox="0 0 240 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Text: ביטוח ישיר -->
  <text x="40" y="55" font-family="Heebo, sans-serif" font-size="48" font-weight="900" fill="#0d1b3d" text-anchor="end" direction="rtl">ביטוח ישיר</text>
  
  <!-- Pink dots -->
  <circle cx="180" cy="20" r="6" fill="#e83b7c" opacity="0.9">
    <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="200" cy="35" r="6" fill="#e83b7c" opacity="0.85">
    <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite" begin="0.2s" />
  </circle>
  <circle cx="215" cy="50" r="6" fill="#e83b7c" opacity="0.8">
    <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite" begin="0.4s" />
  </circle>
</svg>
